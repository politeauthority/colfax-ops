apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor-gateway
spec:
  project: default
  source:
    repoURL: 'git@github.com:politeauthority/private-ops.git'
    path: harbor-gateway/
    targetRevision: main
  destination:
    namespace: harbor
    name: in-cluster
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
