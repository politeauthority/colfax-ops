apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ip-sentry
spec:
  project: default
  source:
    repoURL: 'git@github.com:politeauthority/private-ops.git'
    path: ip-sentry
    targetRevision: main
    helm:
      valueFiles:
        - values-colfax.yaml
  destination:
    namespace: ip-sentry
    name: in-cluster
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
