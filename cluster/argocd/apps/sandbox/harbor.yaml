apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
spec:
  project: default
  source:
    repoURL: 'git@github.com:politeauthority/colfax-ops.git'
    path: cluster/sandbox/harbor
    targetRevision: main
    helm:
      valueFiles:
        - values-colfax.yaml
  destination:
    namespace: harbor
    name: in-cluster
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: harbor-core
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: harbor-jobservice
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: harbor-registry
      jsonPointers:
        - /data
    - group: ""
      kind: Secret
      name: harbor-registry-htpasswd
      jsonPointers:
        - /data
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
