# Prometheus - Helm
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheusstack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "git@github.com:politeauthority/colfax-ops.git"
    path: cluster/bedrock/monitoring/prometheus-stack/
    targetRevision: main
    helm:
      valueFiles:
        - values-colfax.yaml
  sources: []
  destination:
    namespace: monitoring
    name: in-cluster
  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /status
    - group: ""
      kind: PersistentVolume
      jsonPointers:
        - /status
    - group: monitoring.coreos.com
      kind: Prometheus
      jsonPointers:
        - /status
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jqPathExpressions:
        - '.spec.parentRefs[].group'
        - '.spec.parentRefs[].kind'
        - '.spec.rules[].backendRefs[].group'
        - '.spec.rules[].backendRefs[].kind'
        - '.spec.rules[].backendRefs[].weight'
    # These CRDs exceed the 262KB annotation limit with client-side apply.
    # ArgoCD's ServerSideApply=true syncOption is not honoured (v2.14 bug).
    # CRD updates are handled by the kube-prometheus-stack upgrade Job hook.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - '.spec'
        - '.status'
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
