apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # Webhook service — posts to quigley-api
  service.webhook.quigley: |
    url: https://api.alix.lol/argocd
    headers:
      - name: Content-Type
        value: application/json

  # Shared payload template used by all triggers
  template.app-sync-succeeded: |
    webhook:
      quigley:
        method: POST
        body: |
          {
            "app_name": "{{.app.metadata.name}}",
            "project": "{{.app.spec.project}}",
            "sync_status": "{{.app.status.sync.status}}",
            "health_status": "{{.app.status.health.status}}",
            "operation_phase": "{{.app.status.operationState.phase}}",
            "operation_message": "{{.app.status.operationState.message}}",
            "repo_url": "{{.app.spec.source.repoURL}}",
            "target_revision": "{{.app.spec.source.targetRevision}}",
            "sync_revision": "{{.app.status.sync.revision}}"
          }

  template.app-sync-failed: |
    webhook:
      quigley:
        method: POST
        body: |
          {
            "app_name": "{{.app.metadata.name}}",
            "project": "{{.app.spec.project}}",
            "sync_status": "{{.app.status.sync.status}}",
            "health_status": "{{.app.status.health.status}}",
            "operation_phase": "{{.app.status.operationState.phase}}",
            "operation_message": "{{.app.status.operationState.message}}",
            "repo_url": "{{.app.spec.source.repoURL}}",
            "target_revision": "{{.app.spec.source.targetRevision}}",
            "sync_revision": "{{.app.status.sync.revision}}"
          }

  template.app-health-degraded: |
    webhook:
      quigley:
        method: POST
        body: |
          {
            "app_name": "{{.app.metadata.name}}",
            "project": "{{.app.spec.project}}",
            "sync_status": "{{.app.status.sync.status}}",
            "health_status": "{{.app.status.health.status}}",
            "operation_phase": "{{.app.status.operationState.phase}}",
            "operation_message": "{{.app.status.operationState.message}}",
            "repo_url": "{{.app.spec.source.repoURL}}",
            "target_revision": "{{.app.spec.source.targetRevision}}",
            "sync_revision": "{{.app.status.sync.revision}}"
          }

  # Triggers
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded'] && app.status.health.status == 'Healthy'
      send: [app-sync-succeeded]

  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]

  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
