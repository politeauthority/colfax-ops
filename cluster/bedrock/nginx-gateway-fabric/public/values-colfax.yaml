nginx-gateway-fabric:
  nginx:
    replicas: 2
    service:
      type: LoadBalancer
      loadBalancerIP: "192.168.50.80"
      externalTrafficPolicy: Local
    config:
      rewriteClientIP:
        mode: XForwardedFor
        setIPRecursively: true
        trustedAddresses:
          - type: CIDR
            value: 192.168.50.0/24
    pod:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-name: nginx-public
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  nginxGateway:
    replicas: 2
    gatewayClassName: nginx-public
    gatewayControllerName: gateway.nginx.org/nginx-gateway-controller-public
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: nginx-gateway-fabric
            app.kubernetes.io/instance: nginx-gateway-fabric-public
    metrics:
      enable: true
      port: 9113
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
