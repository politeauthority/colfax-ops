nginx-gateway-fabric:
  nginx:
    replicas: 1
    service:
      type: LoadBalancer
      loadBalancerIP: "192.168.50.81"
      externalTrafficPolicy: Local
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "128Mi"
  nginxGateway:
    gatewayClassName: nginx-private
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"
