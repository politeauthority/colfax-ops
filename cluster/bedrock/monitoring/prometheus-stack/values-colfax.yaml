kube-prometheus-stack:
  prometheusOperator:
    admissionWebhooks:
      enabled: false
    tls:
      enabled: false

  alertmanager:
    enabled: false

  defaultRules:
    disabled:
      KubePodCrashLooping: true
      KubePodNotReady: true
      KubeContainerWaiting: true

  additionalPrometheusRulesMap:
    pod-health-custom:
      groups:
        - name: kubernetes-apps-custom
          rules:
            - alert: KubePodCrashLooping
              expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff", job="kube-state-metrics", namespace=~".*"}[5m]) >= 1
              for: 10m
              labels:
                severity: warning
              annotations:
                description: 'Pod {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container }}) is in waiting state (reason: "CrashLoopBackOff") on cluster {{ $labels.cluster }}.'
                runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepodcrashlooping
                summary: Pod is crash looping.
            - alert: KubePodNotReady
              expr: |
                sum by (namespace, pod, job, cluster) (
                  max by (namespace, pod, job, cluster) (
                    kube_pod_status_phase{job="kube-state-metrics", namespace=~".*", phase=~"Pending|Unknown"}
                  ) * on (namespace, pod, cluster) group_left(owner_kind) topk by (namespace, pod, cluster) (
                    1, max by (namespace, pod, owner_kind, cluster) (kube_pod_owner{owner_kind!="Job"})
                  )
                ) > 0
              for: 10m
              labels:
                severity: warning
              annotations:
                description: Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in a non-ready state for longer than 10 minutes on cluster {{ $labels.cluster }}.
                runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubepodnotready
                summary: Pod has been in a non-ready state for more than 10 minutes.
            - alert: KubeContainerWaiting
              expr: kube_pod_container_status_waiting_reason{reason!="CrashLoopBackOff", job="kube-state-metrics", namespace=~".*"} > 0
              for: 10m
              labels:
                severity: warning
              annotations:
                description: 'pod/{{ $labels.pod }} in namespace {{ $labels.namespace }} on container {{ $labels.container}} has been in waiting state for longer than 10 minutes. (reason: "{{ $labels.reason }}") on cluster {{ $labels.cluster }}.'
                runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubecontainerwaiting
                summary: Pod container waiting longer than 10 minutes.

  grafana:
    enabled: true
    grafana.ini:
      feature_toggles:
        onCallAlerting: "false"
    sidecar:
      datasources:
        enabled: true
        skipReload: false
    ingress:
      enabled: false
    envFromSecrets:
      - name: grafana-alerting-creds
    alerting:
      contactpoints.yaml:
        apiVersion: 1
        contactPoints:
          - orgId: 1
            name: Quigley Matrix
            receivers:
              - uid: quigley-matrix
                type: webhook
                settings:
                  url: https://api.alix.lol/grafana-alerts
                  httpMethod: POST
                  username: grafana
                  password: $__env{QUIGLEY_GRAFANA_PASSWORD}
                  authorizationScheme: basic
      policies.yaml:
        apiVersion: 1
        policies:
          - orgId: 1
            receiver: Quigley Matrix
            group_by: ['grafana_folder', 'alertname']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 12h
    # env:
    #   PUID: "1001"
    #   PGID: "1002"
    # persistence:
    #   enabled: false
    #   storageClassName: nfs-client
    #   size: 2Gi
    # initChownData:
    #   enabled: false

  prometheus:
    ingress:
      enabled: false

    prometheusSpec:
      additionalAlertManagerConfigs:
        - static_configs:
            - targets:
                - prometheusstack-grafana.monitoring.svc:80
          path_prefix: /api/alertmanager/grafana

      retention: 30d
      nodeSelector:
        kubernetes.io/hostname: colfax-1
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: local-storage
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

      additionalScrapeConfigs:
        - job_name: "prox-node-hoyt"
          static_configs:
            - targets: [192.168.50.52:9100]
        - job_name: "prox-node-colfax"
          static_configs:
            - targets: [192.168.50.50:9100]

        # Harbor Metrics
        - job_name: "harbor-exporter"
          scrape_interval: 20s
          static_configs:
            # Scrape metrics from the Harbor exporter component
            - targets: ["harbor-exporter.harbor.svc.cluster.local:8001"]
        - job_name: "harbor-core"
          scrape_interval: 20s
          params:
            # Scrape metrics from the Harbor core component
            comp: ["core"]
          static_configs:
            - targets: ["harbor-exporter.harbor.svc.cluster.local:8001"]
        - job_name: "harbor-registry"
          scrape_interval: 20s
          params:
            # Scrape metrics from the Harbor registry component
            comp: ["registry"]
          static_configs:
            - targets: ["harbor-exporter.harbor.svc.cluster.local:8001"]

        # - job_name: minio-job
        #   bearer_token: x
        #   metrics_path: /minio/v2/metrics/cluster
        #   scheme: https
        #   static_configs:
        #     - targets: [a1.alix.lol]

        - job_name: jellyfin
          metrics_path: /metrics
          scheme: http
          static_configs:
            - targets: [jellyfin.q-media.svc.cluster.local]
        - job_name: q-postgres
          metrics_path: /metrics
          scheme: http
          static_configs:
            - targets: [q-post-gressive-postgresql-metrics.q-post-gressive.svc.cluster.local:9187]

        # Q Postgres Metrics
