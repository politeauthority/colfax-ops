harbor:
  nginx:
    nodeSelector:
      kubernetes.io/arch: amd64
  portal:
    nodeSelector:
      kubernetes.io/arch: amd64
  core:
    nodeSelector:
      kubernetes.io/arch: amd64
  jobservice:
    nodeSelector:
      kubernetes.io/arch: amd64
  registry:
    nodeSelector:
      kubernetes.io/arch: amd64
  trivy:
    nodeSelector:
      kubernetes.io/arch: amd64
  exporter:
    nodeSelector:
      kubernetes.io/arch: amd64
  redis:
    internal:
      nodeSelector:
        kubernetes.io/arch: amd64

  expose:
    type: clusterIP
    tls:
      enabled: false
  externalURL: https://harbor.squid-ink.us
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        existingClaim: harbor-registry-longhorn
        storageClass: longhorn
        size: 20Gi
        annotations: {}
      jobservice:
        jobLog:
          existingClaim: harbor-jobservice-longhorn
          storageClass: longhorn
          size: 1Gi
          annotations:
            recurring-job-group.longhorn.io/daily: "enabled"
      redis:
        storageClass: longhorn
        size: 1Gi
      trivy:
        storageClass: longhorn
        size: 5Gi
  metrics:
    enabled: true
    core:
      path: /metrics
      port: 8001
    registry:
      path: /metrics
      port: 8001
    jobservice:
      path: /metrics
      port: 8001
    exporter:
      path: /metrics
      port: 8001

  database:
    type: external
    external:
      host: "q-postgres-rw.q-postgres.svc.cluster.local"
      port: "5432"
      username: "harbor_admin"
      coreDatabase: "harbor_registry"
      notaryServerDatabase: "harbor_notary_server"
      notarySignerDatabase: "harbor_notary_signer"
      # if using existing secret, the key must be "password"
      existingSecret: "harbor-postgres"
      sslmode: "disable"
