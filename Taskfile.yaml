version: '3'
tasks:

  check-k:
    cmds:
      - |
        echo "Checking cluster/argocd"
        kustomize build cluster/argocd

        echo "Checking cluster/bedrock/gateway-api-crds"
        kustomize build cluster/bedrock/gateway-api-crds

        echo "Checking cluster/sandbox/mosquitto"
        kustomize build cluster/sandbox/mosquitto

        echo "Checking cluster/sandbox/github-runners"
        kustomize build cluster/sandbox/github-runners

    silent: true

  setup-helm:
    cmds:
      - |
        helm repo add jetstack https://charts.jetstack.io
        helm repo add fluent https://fluent.github.io/helm-charts
        helm repo add grafana https://grafana.github.io/helm-charts
        helm repo add harbor https://helm.goharbor.io
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo add nfs-subdir-external-provisioner https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner/
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
    silent: true

  check-helm:
    deps: [setup-helm]
    cmds:
      - |
        echo "Checking cert-manager"
        helm dependency build cluster/bedrock/cert-manager
        helm lint cluster/bedrock/cert-manager -f cluster/bedrock/cert-manager/values-colfax.yaml

        echo "Checking fluentbit"
        helm dependency build cluster/bedrock/fluentbit
        helm lint cluster/bedrock/fluentbit -f cluster/bedrock/fluentbit/values-colfax.yaml

        echo "Checking ingress-private"
        helm dependency build cluster/bedrock/ingress/ingress-private
        helm lint cluster/bedrock/ingress/ingress-private -f cluster/bedrock/ingress/ingress-private/values-colfax.yaml

        echo "Checking ingress-public"
        helm dependency build cluster/bedrock/ingress/ingress-public
        helm lint cluster/bedrock/ingress/ingress-public -f cluster/bedrock/ingress/ingress-public/values-colfax.yaml

        echo "Checking nginx-gateway-fabric/private"
        helm dependency build cluster/bedrock/nginx-gateway-fabric/private
        helm lint cluster/bedrock/nginx-gateway-fabric/private -f cluster/bedrock/nginx-gateway-fabric/private/values-colfax.yaml

        echo "Checking nginx-gateway-fabric/public"
        helm dependency build cluster/bedrock/nginx-gateway-fabric/public
        helm lint cluster/bedrock/nginx-gateway-fabric/public -f cluster/bedrock/nginx-gateway-fabric/public/values-colfax.yaml

        echo "Checking monitoring/prometheus-stack"
        helm dependency build cluster/bedrock/monitoring/prometheus-stack
        helm lint cluster/bedrock/monitoring/prometheus-stack -f cluster/bedrock/monitoring/prometheus-stack/values-colfax.yaml

        echo "Checking storage/nfs-client"
        helm dependency build cluster/bedrock/storage/nfs-client
        helm lint cluster/bedrock/storage/nfs-client -f cluster/bedrock/storage/nfs-client/values-colfax.yaml

        echo "Checking harbor"
        helm dependency build cluster/sandbox/harbor
        helm lint cluster/sandbox/harbor -f cluster/sandbox/harbor/values-colfax.yaml

    silent: true

  mac-worker-up:
    desc: "Start Colima and rejoin mac-worker node to the cluster"
    cmds:
      - |
        set -e

        # Start Colima if not already running
        if ! colima status 2>/dev/null | grep -q "running"; then
          echo "Starting Colima..."
          colima start --network-address --cpu 4 --memory 8 --disk 40 --vm-type qemu --network-mode bridged --network-interface en0
        else
          echo "Colima already running"
        fi

        # Generate SSH config
        colima ssh-config > /tmp/colima-ssh.conf

        # Restore resolv.conf symlink (doesn't survive restarts)
        ssh -F /tmp/colima-ssh.conf colima \
          "sudo mkdir -p /run/systemd/resolve && sudo ln -sf /etc/resolv.conf /run/systemd/resolve/resolv.conf 2>/dev/null; true"

        # Get current VM IP
        COLIMA_IP=$(colima list --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['address'])" 2>/dev/null)
        if [ -z "$COLIMA_IP" ]; then
          echo "ERROR: Could not determine Colima VM IP"
          exit 1
        fi
        echo "Colima VM IP: $COLIMA_IP"

        # Check if node already exists and is Ready
        if kubectl get node mac-worker &>/dev/null; then
          NODE_STATUS=$(kubectl get node mac-worker -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
          if [ "$NODE_STATUS" = "True" ]; then
            echo "mac-worker is already Ready — uncordoning if needed"
            kubectl uncordon mac-worker 2>/dev/null || true
          else
            echo "mac-worker exists but not Ready — updating kubelet IP and restarting"
            ssh -F /tmp/colima-ssh.conf colima \
              "sudo sh -c 'echo KUBELET_EXTRA_ARGS=--node-ip=${COLIMA_IP} > /etc/default/kubelet' && sudo systemctl restart kubelet"
          fi
        else
          echo "Joining cluster as mac-worker..."
          # Update kubelet node-ip in case IP changed
          ssh -F /tmp/colima-ssh.conf colima \
            "sudo sh -c 'echo KUBELET_EXTRA_ARGS=--node-ip=${COLIMA_IP} > /etc/default/kubelet'"

          JOIN_CMD=$(ssh ubuntu@192.168.50.60 "sudo kubeadm token create --print-join-command --ttl 2h")
          ssh -F /tmp/colima-ssh.conf colima "sudo $JOIN_CMD --node-name mac-worker"

          echo "Labeling node..."
          sleep 5
          kubectl label node mac-worker node-role.kubernetes.io/worker=worker location=mac-local --overwrite
        fi

        echo ""
        kubectl get node mac-worker -o wide

  mac-worker-down:
    desc: "Safely drain, remove mac-worker from cluster, and stop Colima"
    cmds:
      - |
        set -e

        if kubectl get node mac-worker &>/dev/null; then
          echo "Draining mac-worker..."
          kubectl drain mac-worker --ignore-daemonsets --delete-emptydir-data --timeout=120s

          echo "Deleting node from cluster..."
          kubectl delete node mac-worker
        else
          echo "mac-worker not found in cluster, skipping drain/delete"
        fi

        echo "Stopping Colima..."
        colima stop

        echo "mac-worker stopped and removed."
