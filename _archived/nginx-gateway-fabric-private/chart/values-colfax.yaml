nginx-gateway-fabric:
  nginx:
    replicas: 2
    service:
      type: LoadBalancer
      loadBalancerIP: "192.168.50.81"
      externalTrafficPolicy: Local
    config:
      rewriteClientIP:
        mode: XForwardedFor
        setIPRecursively: true
        trustedAddresses:
          - type: CIDR
            value: 192.168.50.0/24
    pod:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              gateway.networking.k8s.io/gateway-name: nginx-private
  nginxGateway:
    replicas: 2
    gatewayClassName: nginx-private
    gatewayControllerName: gateway.nginx.org/nginx-gateway-controller-private
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: nginx-gateway-fabric
            app.kubernetes.io/instance: nginx-gateway-fabric-private
